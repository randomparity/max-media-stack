---
profilarr:
  name: profilarr
  description: "Profilarr - Quality Profile & Custom Format Manager (v2)"
  image: "ghcr.io/dictionarry-hub/profilarr:2.0.0"
  volumes:
    - "{{ mms_config_dir }}/profilarr:/config:Z"
  environment:
    - "PUID=0"
    - "PGID=0"
    - "UMASK=022"
    - "TZ={{ mms_timezone }}"
    - "AUTH=on"
  health_cmd: "curl -sf http://localhost:6868/api/v1/health || exit 1"
  health_interval: "60s"
  backup_type: "arr"
  backup_db_files: []
