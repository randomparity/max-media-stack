---
sonarr:
  name: sonarr
  description: "Sonarr - TV Series Manager"
  image: "lscr.io/linuxserver/sonarr:4.0.17.2952-ls314"
  volumes:
    - "{{ mms_config_dir }}/sonarr:/config:Z"
    - "{{ mms_data_dir }}:/data"
  environment:
    - "PUID=0"
    - "PGID=0"
    - "TZ={{ mms_timezone }}"
  health_cmd: "curl -sf http://localhost:8989/ping || exit 1"
  health_interval: "60s"
  backup_type: "arr"
  backup_db_files: ["sonarr.db"]
