---
# Pull images before starting services to avoid systemd timeout on first boot
- name: Check if Open Notebook images are present
  ansible.builtin.command:
    cmd: "podman image exists {{ item }}"
  loop:
    - "{{ open_notebook_db_image }}"
    - "{{ open_notebook_app_image }}"
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  register: _open_notebook_images
  changed_when: false
  failed_when: false
  check_mode: false

- name: Pull missing Open Notebook images
  ansible.builtin.command:
    cmd: "podman pull {{ item.item }}"
  loop: "{{ _open_notebook_images.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.rc != 0
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  changed_when: true
  timeout: 1800

# Flush handlers to ensure daemon-reload happens before starting services
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

# Enable and start services in dependency order. A config change recorded in
# setup.yml triggers a restart so the new env/quadlet takes effect; otherwise
# the service is only ensured started (idempotent no-op when already running).
- name: Enable and start (or restart on change) SurrealDB
  ansible.builtin.systemd:
    name: open-notebook-db.service
    enabled: true
    state: "{{ 'restarted' if open_notebook_db_config_changed | default(false) else 'started' }}"
    scope: user
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"

- name: Wait for SurrealDB to be ready
  ansible.builtin.command:
    cmd: podman exec open-notebook-db /surreal isready -e http://localhost:8000
  register: _open_notebook_db_health
  until: _open_notebook_db_health.rc == 0
  retries: 12
  delay: 10
  changed_when: false
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  when: not ansible_check_mode

- name: Enable and start (or restart on change) Open Notebook
  ansible.builtin.systemd:
    name: open-notebook.service
    enabled: true
    state: "{{ 'restarted' if open_notebook_app_config_changed | default(false) else 'started' }}"
    scope: user
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"

- name: Wait for Open Notebook health check
  ansible.builtin.command:
    cmd: podman healthcheck run open-notebook
  register: _open_notebook_health
  until: _open_notebook_health.rc == 0
  retries: 18
  delay: 10
  changed_when: false
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  when: not ansible_check_mode
