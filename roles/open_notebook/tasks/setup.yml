---
- name: Create Open Notebook config directory
  ansible.builtin.file:
    path: "{{ open_notebook_config_dir }}"
    state: directory
    owner: "{{ mms_user }}"
    group: "{{ mms_user }}"
    mode: "0755"
  become: true

- name: Create Open Notebook data directory
  ansible.builtin.file:
    path: "{{ open_notebook_config_dir }}/data"
    state: directory
    owner: "{{ mms_user }}"
    group: "{{ mms_user }}"
    mode: "0755"
  become: true

- name: Create SurrealDB data directory
  ansible.builtin.file:
    path: "{{ open_notebook_db_dir }}"
    state: directory
    owner: "{{ mms_user }}"
    group: "{{ mms_user }}"
    mode: "0755"
  become: true

- name: Deploy SurrealDB environment file
  ansible.builtin.template:
    src: open-notebook-db.env.j2
    dest: "{{ open_notebook_config_dir }}/open-notebook-db.env"
    owner: "{{ mms_user }}"
    group: "{{ mms_user }}"
    mode: "0600"
  become: true
  no_log: true
  register: _open_notebook_db_env

- name: Deploy Open Notebook environment file
  ansible.builtin.template:
    src: open-notebook.env.j2
    dest: "{{ open_notebook_config_dir }}/open-notebook.env"
    owner: "{{ mms_user }}"
    group: "{{ mms_user }}"
    mode: "0600"
  become: true
  no_log: true
  register: _open_notebook_app_env

- name: Deploy SurrealDB container quadlet
  ansible.builtin.template:
    src: open-notebook-db.container.j2
    dest: "{{ mms_quadlet_dir }}/open-notebook-db.container"
    owner: "{{ mms_user }}"
    group: "{{ mms_user }}"
    mode: "0644"
  become: true
  register: _open_notebook_db_quadlet
  notify: Reload systemd user daemon

- name: Deploy Open Notebook container quadlet
  ansible.builtin.template:
    src: open-notebook.container.j2
    dest: "{{ mms_quadlet_dir }}/open-notebook.container"
    owner: "{{ mms_user }}"
    group: "{{ mms_user }}"
    mode: "0644"
  become: true
  register: _open_notebook_app_quadlet
  notify: Reload systemd user daemon

# Record config changes so containers.yml can restart only what changed.
# Restarts live in the runtime path (containers.yml), keeping setup.yml
# free of any task that needs a running container — so it is testable on
# its own (Molecule converges setup.yml only).
- name: Record whether SurrealDB configuration changed
  ansible.builtin.set_fact:
    open_notebook_db_config_changed: "{{ _open_notebook_db_env is changed or _open_notebook_db_quadlet is changed }}"

- name: Record whether Open Notebook configuration changed
  ansible.builtin.set_fact:
    open_notebook_app_config_changed: "{{ _open_notebook_app_env is changed or _open_notebook_app_quadlet is changed }}"
