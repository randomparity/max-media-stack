---
driver:
  name: docker

platforms:
  - name: base-system-test
    image: fedora:43
    dockerfile: ../../../../molecule/shared/Dockerfile.j2
    pre_build_image: false
    privileged: true
    command: /usr/lib/systemd/systemd
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  env:
    # Resolve the role-under-test: MOLECULE_PROJECT_DIRECTORY is roles/<role>,
    # so its parent is the repo roles/ directory.
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..
  inventory:
    host_vars:
      base-system-test:
        mms_user: mms
        mms_uid: "3000"
        mms_gid: "3000"
        mms_timezone: America/New_York
        mms_vm_hostname: test-host
        mms_home: /home/mms
        mms_quadlet_dir: /home/mms/.config/containers/systemd
