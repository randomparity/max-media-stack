---
# Runtime: pull the image, (re)start Traefik, and health-check. Requires a
# running rootless Podman, so it is not exercised by the setup-only Molecule
# scenario.
- name: Check if Traefik image is present
  ansible.builtin.command:
    cmd: "podman image exists {{ traefik_image }}"
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  register: _traefik_image_exists
  changed_when: false
  failed_when: false
  check_mode: false

- name: Pull Traefik image
  ansible.builtin.command:
    cmd: "podman pull {{ traefik_image }}"
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  when: _traefik_image_exists.rc != 0
  changed_when: true
  timeout: 900

# Pick up a new/changed quadlet unit before starting. Explicit task rather than
# a handler so the setup-only scenario needs no running user manager.
- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  when: traefik_quadlet_file is changed

- name: Enable and start (or restart on change) Traefik
  ansible.builtin.systemd:
    name: traefik.service
    enabled: true
    state: "{{ 'restarted' if traefik_config_changed | default(false) else 'started' }}"
    scope: user
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"

- name: Wait for Traefik health check
  ansible.builtin.command:
    cmd: podman healthcheck run traefik
  register: _traefik_health
  until: _traefik_health.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  when: not ansible_check_mode
