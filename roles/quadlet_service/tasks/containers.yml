---
# Runtime: pull the image, (re)start the service, health-check, and apply INI
# settings. Requires a running rootless Podman, so it is not exercised by the
# setup-only Molecule scenario.
- name: "Check if container image is present ({{ service_name }})"
  ansible.builtin.command:
    cmd: "podman image exists {{ quadlet_service_def.image }}"
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  register: quadlet_service_image_exists
  changed_when: false
  failed_when: false
  check_mode: false

- name: "Pull container image ({{ service_name }})"
  ansible.builtin.command:
    cmd: "podman pull {{ quadlet_service_def.image }}"
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  when: quadlet_service_image_exists.rc != 0
  changed_when: true
  timeout: 900

# Pick up the new/changed quadlet unit before starting the service. Done as an
# explicit task (not a handler) so it is unambiguous across the per-service
# deploy loop and needs no templated handler name.
- name: "Reload systemd user daemon ({{ service_name }})"
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  when: quadlet_service_container_file is changed

# Restart when setup.yml rendered new config so it takes effect; otherwise
# just ensure the service is started.
- name: "Enable and start (or restart on change) service ({{ service_name }})"
  ansible.builtin.systemd:
    name: "{{ quadlet_service_def.name }}.service"
    enabled: true
    state: "{{ 'restarted' if quadlet_service_config_changed | default(false) else 'started' }}"
    scope: user
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"

- name: "Set health check timeout ({{ service_name }})"
  ansible.builtin.set_fact:
    quadlet_service_health_timeout_val: >-
      {{ (quadlet_service_container_file is changed) |
         ternary(quadlet_service_first_boot_health_timeout, quadlet_service_health_timeout) }}

- name: "Wait for service health check ({{ service_name }})"
  ansible.builtin.shell:
    cmd: |
      if ! podman ps -q --filter name=^{{ quadlet_service_def.name }}$ --filter status=running | grep -q .; then
        echo "Container {{ quadlet_service_def.name }} is not running" >&2
        exit 2
      fi
      podman healthcheck run {{ quadlet_service_def.name }}
  register: quadlet_service_health_result
  until: quadlet_service_health_result.rc == 0
  retries: "{{ (quadlet_service_health_timeout_val | int / quadlet_service_health_delay) | int }}"
  delay: "{{ quadlet_service_health_delay }}"
  changed_when: false
  failed_when: quadlet_service_health_result.rc == 2
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  when: quadlet_service_def.health_cmd is defined and not ansible_check_mode

- name: "Initialize INI check result ({{ service_name }})"
  ansible.builtin.set_fact:
    quadlet_service_ini_check:
      changed: false
      results: []

- name: "Check if INI settings need updating ({{ service_name }})"
  community.general.ini_file:
    path: "{{ mms_config_dir }}/{{ quadlet_service_def.name }}/{{ ini_setting.path }}"
    section: "{{ ini_setting.section }}"
    option: "{{ ini_setting.option }}"
    value: "{{ ini_setting.value }}"
    owner: "{{ mms_user }}"
    group: "{{ mms_user }}"
    mode: "0600"
    no_extra_spaces: true
  become: true
  check_mode: true
  diff: false
  loop: "{{ quadlet_service_def.ini_settings | default([]) }}"
  loop_control:
    loop_var: ini_setting
    label: "[{{ ini_setting.section }}] {{ ini_setting.option }}"
  register: quadlet_service_ini_check
  when: quadlet_service_def.ini_settings is defined

# SABnzbd (and similar apps) write their in-memory config to disk on
# shutdown, which overwrites any INI changes we made while the service
# was running.  To avoid this race we stop first (letting the app flush
# its config), apply our changes on the now-quiet file, then start again.
- name: "Stop service for INI update ({{ service_name }})"
  ansible.builtin.systemd:
    name: "{{ quadlet_service_def.name }}.service"
    state: stopped
    scope: user
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  when:
    - quadlet_service_def.ini_settings is defined and quadlet_service_ini_check is changed
    - not ansible_check_mode

- name: "Apply INI file settings ({{ service_name }})"
  community.general.ini_file:
    path: "{{ mms_config_dir }}/{{ quadlet_service_def.name }}/{{ ini_setting.path }}"
    section: "{{ ini_setting.section }}"
    option: "{{ ini_setting.option }}"
    value: "{{ ini_setting.value }}"
    owner: "{{ mms_user }}"
    group: "{{ mms_user }}"
    mode: "0600"
    no_extra_spaces: true
  become: true
  loop: "{{ quadlet_service_def.ini_settings | default([]) }}"
  loop_control:
    loop_var: ini_setting
    label: "[{{ ini_setting.section }}] {{ ini_setting.option }}"
  when:
    - quadlet_service_def.ini_settings is defined and quadlet_service_ini_check is changed

- name: "Start service after INI update ({{ service_name }})"
  ansible.builtin.systemd:
    name: "{{ quadlet_service_def.name }}.service"
    state: started
    scope: user
  become: true
  become_user: "{{ mms_user }}"
  environment: "{{ mms_systemd_env }}"
  when:
    - quadlet_service_def.ini_settings is defined and quadlet_service_ini_check is changed
    - not ansible_check_mode
